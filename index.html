<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>灯台さん.com</title>
  <meta name="description" content="物語とぬいぐるみ。琥珀の空と海のあいだに、灯台が立つ。" />
  <style>
    :root{
      /* 空：暗めの琥珀 / 海：暗めのブルーグリーン */
      --sky-0:#2a1a12;
      --sky-1:#3b2415;
      --sky-2:#4a2b18;

      --sea-0:#072626;
      --sea-1:#0a3434;
      --sea-2:#0d4746;

      --honey-0:#f6d27a;
      --honey-1:#ffcf67;
      --honey-2:#ffd98f;

      --text:#f4efe6;
      --muted:rgba(244,239,230,.72);
      --glass:rgba(255,255,255,.08);
      --stroke:rgba(255,255,255,.15);
      --shadow:rgba(0,0,0,.35);
    }

    *{
      box-sizing:border-box;
    }
    html,body{
      height:100%;
      margin:0;
    }
    body{
      font-family: ui-serif, "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", Georgia, serif;
      color:var(--text);
      overflow:hidden;
      background:#000;
    }

    /* 全面のシーン */
    .scene{
      position:fixed;
      inset:0;
      display:grid;
      grid-template-rows: 66.666% 33.334%;
    }

    .sky{
      position:relative;
      background:
        radial-gradient(1200px 1000px at 25% 48%, rgba(255,211,135,.14), transparent 55%),
        radial-gradient(900px 1000px at 75% 49%, rgba(255,185,90,.10), transparent 60%),
        linear-gradient(180deg, var(--sky-0), var(--sky-1) 55%, var(--sky-2));
      overflow:hidden;
    }

    .sea{
      position:relative;
      background:
        radial-gradient(900px 320px at 20% 10%, rgba(116,245,220,.10), transparent 60%),
        linear-gradient(180deg, var(--sea-0), var(--sea-1) 55%, var(--sea-2));
      overflow:hidden;
      border-top: 1px solid rgba(255,255,255,.10);
    }

    /* 境界線（水平線） */
    .horizon{
      position:absolute;
      left:0;
      right:0;
      bottom:-1px;
      height:2px;
      background: linear-gradient(90deg,
        transparent,
        rgba(255,217,143,.22) 18%,
        rgba(255,255,255,.10) 50%,
        rgba(90,230,200,.18) 82%,
        transparent
      );
      filter: blur(.2px);
      opacity:.9;
      pointer-events:none;
    }

    /* UI */
    .ui{
      position:fixed;
      inset:0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding: clamp(18px, 4vw, 40px);
      pointer-events:none;
    }

    .card{
      width:min(980px, 100%);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events:auto;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width: 220px;
    }
    .brand .name{
      font-size: 20px;
      letter-spacing: .08em;
      font-weight: 700;
      text-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .brand .tag{
      font-size: 13px;
      color:var(--muted);
      letter-spacing:.03em;
    }

    nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }

    a.pill{
      text-decoration:none;
      color:var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.10);
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
      box-shadow: 0 10px 26px rgba(0,0,0,.16);
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-size: 14px;
      letter-spacing:.04em;
    }
    a.pill:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.26);
    }
    a.pill:active{
      transform: translateY(0px) scale(.99);
    }

    .dot{
      width:10px; height:10px; border-radius:50%;
      background: radial-gradient(circle at 30% 30%, var(--honey-2), var(--honey-1) 45%, rgba(255,160,60,.35) 72%, transparent 78%);
      box-shadow: 0 0 12px rgba(255,210,120,.35);
      flex:0 0 auto;
    }

    /* 下部のフッター風メッセージ */
    .footer{
      position:fixed;
      left:0; right:0;
      bottom:0;
      padding: 18px 22px;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }
    .footer .note{
      width:min(980px, 100%);
      color: rgba(244,239,230,.78);
      font-size: 12.5px;
      letter-spacing:.02em;
      line-height:1.6;
      text-shadow: 0 10px 24px rgba(0,0,0,.28);
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(0,0,0,.10);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* キャンバスたち */
    canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    /* 灯台（CSSで構成） */
    .lighthouse{
      position:absolute;
      left:50%;
      /* bottom: 266%; /* 海との境界から伸びる */
      bottom: 0%; /* 水平線（.skyの下端）に合わせる */
      transform: translateX(-50%);
      width: clamp(72px, 11vw, 72px); /* 全体の基準幅 */
      height: clamp(160px, 42vh, 200px); /* 全体の基準高さ */
      pointer-events:none;
      filter: drop-shadow(0 26px 50px rgba(0,0,0,.35));
      /* position: relative; /* 子要素のabsolute基準にする */
    }

    /* 灯台の本体（下部ポール） */
    .lighthouse__body{
      position:absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 50%; /* lighthouseの幅の50% */
      height: 80%; /* lighthouseの高さの80% */
      background: linear-gradient(180deg,
        rgba(214,214,214,.92),
        rgba(180,180,180,.85) 55%,
        rgba(150,150,150,.78)
      );
      border: 1px solid rgba(255,255,255,.12);
      clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); /* わずかに先細り */
    }

    /* 灯台の頭部全体を包むコンテナ */
    .lighthouse__head{
      position:absolute;
      top: 0; /* lighthouseの上端に配置 */
      left: 50%;
      transform: translateX(-50%);
      width: 100%; /* lighthouseの幅に合わせる */
      height: 32%; /* lighthouseの高さの20% */
      z-index: 1; /* bodyより手前に */
      position: relative; /* 子要素のabsolute基準にする */
    }

    /* 天辺の小さな丸 */
    .lighthouse__head__knob{
      position: absolute;
      top: -12px; /* ベルの少し上に配置 */
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%; /* 丸にする */
      background: linear-gradient(180deg,
        rgba(214,214,214,.92),
        rgba(180,180,180,.85)
      );
      border: 1px solid rgba(255,255,255,.12);
      z-index: 4; /* 他の要素より手前に */
    }

    /* 光源下の台座 */
    .lighthouse__head::before{
      content: "";
      position: absolute;
      bottom: 36%; /* lighthouse__headの底から */
      left: 50%;
      transform: translateX(-50%);
      width: 70%; /* lighthouse__headの幅の70% */
      height: 5px;
      background: linear-gradient(180deg,
        rgba(180,180,180,.92),
        rgba(150,150,150,.85)
      );
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 3px;
      z-index: 1;
    }

    /* 伏せたベル型屋根 */
    .lighthouse__head::after{
      content: "";
      position: absolute;
      top: 0; /* lighthouse__headのトップから */
      left: 50%;
      transform: translateX(-50%);
      width: 85%; /* lighthouse__headの幅の85% */
      height: 60%; /* lighthouse__headの高さの60% */
      background: linear-gradient(180deg,
        rgba(214,214,214,.92),
        rgba(180,180,180,.85) 55%,
        rgba(150,150,150,.78)
      );
      border: 1px solid rgba(255,255,255,.12);
      /* 伏せたベル型の上部を表現 */
      clip-path: polygon(
        45% 0%,
        55% 0%,
        65% 5%,
        70% 10%,
        75% 35%,
        90% 50%,
        10% 50%,
        25% 35%,
        30% 10%,
        35% 5%
      );
      z-index: 2;
    }

    /* 光源本体（光線を出す部分） */
    .lighthouse__lantern{
      position:absolute;
      bottom: 45%; /* lighthouse__headの底から */
      left: 50%;
      transform: translateX(-50%);
      width: 40%; /* lighthouse__headの幅の60% */
      height: 15px;
      background: linear-gradient(180deg,
        var(--honey-2), /* 明るい蜂蜜色 */
        var(--honey-1)
      );
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 5px;
      z-index: 3;
      /* 光線の表現 */
      box-shadow:
        0 0 15px 5px var(--honey-0), /* 中心光 */
        -30px 0 25px 10px var(--honey-0), /* 左光 */
        30px 0 25px 10px var(--honey-0); /* 右光 */
    }

    /* レスポンシブ微調整 */
    @media (max-width:520px){
      .brand{ min-width: 0; }
      .brand .name{ font-size:18px; }
      a.pill{ padding: 9px 12px; font-size: 13px; }
    }
  </style>
</head>

<body>
  <div class="scene" aria-hidden="true">
    <div class="sky" id="sky">
      <canvas id="skyFX"></canvas>
      <div class="horizon"></div>
      <!-- 境界から伸びる灯台 -->
      <div class="lighthouse" aria-hidden="true">
        <div class="lighthouse__body"></div>
        <div class="lighthouse__head">
          <div class="lighthouse__head__knob"></div> <!-- 天辺の小さな丸 -->
          <div class="lighthouse__lantern"></div> <!-- 光源本体 -->
        </div>
      </div>
    </div>

    <div class="sea" id="sea">
      <canvas id="seaFX"></canvas>
    </div>
  </div>

  <div class="ui">
    <div class="card">
        <div class="brand">
          <div class="name">灯台さん.com</div>
          <div class="tag">琥珀の空と海のあいだで、ものがたりとぬいぐるみを。</div>
          <nav aria-label="カテゴリー">
            <a class="pill" href="story"><span class="dot"></span>物語</a>
            <a class="pill" href="#plush"><span class="dot"></span>ぬいぐるみ</a>
          </nav>
        </div>
    </div>
  </div>
  <!--
  <div class="footer">
    <div class="note">
      ここは仮のトップページです。リンク先（#story / #plush）にセクションや別ページを増やしていけます。
    }
  </div>
  -->

  <script>
    // -------------- 便利関数 --------------
    const DPR = () => Math.min(2, window.devicePixelRatio || 1);

    function fitCanvas(canvas){
      const dpr = DPR();
      const rect = canvas.getBoundingClientRect();
      canvas.width  = Math.floor(rect.width  * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr,0,0,dpr,0,0);
      return {ctx, w: rect.width, h: rect.height};
    }

    // skyCanvasを定義する
    const skyCanvas = document.getElementById("skyFX");
    let sky = {ctx:null,w:0,h:0};

    // 雲の形状を定義するパスデータ
    // 各形状は、基準となる矩形 (0,0)から(BASE_CLOUD_WIDTH, BASE_CLOUD_HEIGHT) に収まるように設計
    const BASE_CLOUD_WIDTH = 170; // 基準の最大幅
    const BASE_CLOUD_HEIGHT = 80; // 基準の最大高さ

    const cloudShapes = [
      // 雲1: 上部に丸みがあり、右が細くなっている (既存の汎用雲)
      (ctx) => {
        ctx.moveTo(0, 30);
        ctx.bezierCurveTo(15, 0, 80, 0, 100, 10);
        ctx.bezierCurveTo(130, 0, 150, 20, 170, 30);
        ctx.bezierCurveTo(175, 40, 160, 50, 150, 50);
        ctx.bezierCurveTo(120, 60, 50, 60, 0, 40);
        ctx.closePath();
      },
      // 雲2: 真ん中が盛り上がり、両端が水平に近い (既存の汎用雲)
      (ctx) => {
        ctx.moveTo(0, 40);
        ctx.bezierCurveTo(20, 10, 60, 0, 85, 20);
        ctx.bezierCurveTo(110, 0, 150, 10, 170, 40);
        ctx.bezierCurveTo(150, 60, 80, 70, 85, 50);
        ctx.bezierCurveTo(60, 70, 20, 60, 0, 40);
        ctx.closePath();
      },
      // 雲3: 複数の丸い塊が連なっている (既存の汎用雲)
      (ctx) => {
        ctx.moveTo(0, 45);
        ctx.bezierCurveTo(10, 20, 30, 10, 50, 20);
        ctx.bezierCurveTo(70, 10, 90, 20, 110, 30);
        ctx.bezierCurveTo(130, 20, 150, 30, 170, 45);
        ctx.bezierCurveTo(150, 70, 130, 80, 110, 60);
        ctx.bezierCurveTo(90, 80, 70, 70, 50, 50);
        ctx.bezierCurveTo(30, 70, 10, 60, 0, 45);
        ctx.closePath();
      },
      // 雲4: 魚の形 (既存の魚の形1)
      (ctx) => {
        // Start at an approximate head position
        ctx.moveTo(10, 40); // Head point

        // Upper body curve
        ctx.bezierCurveTo(30, 10,  70, 0,  110, 15);
        // Upper back / start of tail fin
        ctx.bezierCurveTo(130, 5, 150, 15, 160, 30);
        // Upper fin of tail
        ctx.bezierCurveTo(170, 35, 165, 45, 155, 50); // Tail fin peak
        // Lower fin of tail
        ctx.bezierCurveTo(150, 55, 130, 65, 110, 60);
        // Lower body curve
        ctx.bezierCurveTo(70, 75, 30, 70, 10, 40); // Back to head
        ctx.closePath();
      },
      // 雲: 鳥が飛んでいるような形 (修正: 新しい鳥の形)
      (ctx) => {
          // 広げた翼を持つ鳥のシンプルなシルエット
          // 鳥の体/頭の中心
          ctx.moveTo(85, 30); // 鳥の体/頭の中心点
          ctx.bezierCurveTo(75, 10, 30, 10, 0, 30); // 左翼の上部曲線
          ctx.bezierCurveTo(10, 50, 50, 60, 80, 45); // 左翼の下部曲線、体に戻る
          
          // 尾
          ctx.bezierCurveTo(90, 60, 100, 65, 110, 60); // 尾の部分
          
          // 右翼
          ctx.bezierCurveTo(130, 60, 170, 50, 160, 30); // 右翼の下部曲線
          ctx.bezierCurveTo(130, 10, 95, 10, 85, 30); // 右翼の上部曲線、中央に戻る
          ctx.closePath();
      },
      // 雲: クジラが泳いでいるような形 (修正: 新しいクジラの形)
      (ctx) => {
          ctx.moveTo(10, 40); // 鼻先
          ctx.bezierCurveTo(30, 10, 80, 5, 120, 20); // 上半身の曲線
          ctx.bezierCurveTo(140, 10, 160, 25, 165, 35); // 尾びれの上部先端
          ctx.bezierCurveTo(160, 45, 140, 60, 120, 50); // 尾びれの下部先端
          ctx.bezierCurveTo(80, 70, 30, 60, 10, 40); // 下半身の曲線、鼻先に戻る
          ctx.closePath();
      },
      // 雲: 龍のような形 (追加: ドーナツの雲の代わり)
      (ctx) => {
          ctx.moveTo(10, 40); // 鼻先/口元
          ctx.bezierCurveTo(20, 20, 50, 10, 70, 20); // 頭の角と首が上がる曲線
          ctx.bezierCurveTo(90, 0, 120, 10, 140, 30); // 最初の胴体の隆起
          ctx.bezierCurveTo(150, 20, 160, 40, 150, 50); // 2番目の胴体の隆起/尾の始まり
          ctx.bezierCurveTo(130, 70, 100, 75, 70, 60); // 胴体が下がる曲線
          ctx.bezierCurveTo(40, 70, 10, 55, 10, 40); // 下顎/喉、鼻先に戻る
          ctx.closePath();
      },
      // 雲: 魚のような形２ (追加)
      (ctx) => {
          ctx.moveTo(10, 30); // 口/鼻先
          ctx.bezierCurveTo(20, 10, 50, 0, 80, 10); // 上半身の曲線
          ctx.bezierCurveTo(100, 5, 120, 15, 130, 25); // 背中から尾の付け根
          ctx.bezierCurveTo(140, 20, 150, 30, 140, 40); // 尾びれの上部（より垂直）
          ctx.bezierCurveTo(150, 50, 140, 60, 130, 55); // 尾びれの下部
          ctx.bezierCurveTo(120, 65, 100, 70, 80, 60); // 下半身の曲線
          ctx.bezierCurveTo(50, 70, 20, 50, 10, 30); // 腹部から口に戻る
          ctx.closePath();
      }
    ];

    // 雲オブジェクトのクラスを定義
    class Cloud {
      constructor(canvasWidth, canvasHeight) {
        this.reset(canvasWidth, canvasHeight, true); // initial trueで初期位置を右外側に設定
      }

      // 雲の状態をリセット（再生成）する
      reset(canvasWidth, canvasHeight, initial = false) {
        this.shapeIndex = Math.floor(Math.random() * cloudShapes.length);
        this.baseWidth = BASE_CLOUD_WIDTH;
        this.baseHeight = BASE_CLOUD_HEIGHT;

        // スケールをランダムに設定（縦横比を収縮）
        this.scaleX = 0.6 + Math.random() * 0.8; // 0.6倍から1.4倍
        this.scaleY = 0.6 + Math.random() * 0.8; // 0.6倍から1.4倍

        // 実際の雲のサイズ
        this.width = this.baseWidth * this.scaleX;
        this.height = this.baseHeight * this.scaleY;

        // Y座標はキャンバスの上部40%くらいに配置
        this.y = Math.random() * (canvasHeight * 0.4); // 上半分より少し上まで

        if (initial) {
          // 初期生成時は画面の右外から
          this.x = canvasWidth + Math.random() * canvasWidth * 0.5;
        } else {
          // 画面の右外から再出現
          this.x = canvasWidth + this.width + Math.random() * canvasWidth * 0.5; // 画面右外に雲の幅分+αのオフセット
        }

        // スピードは雲ごとにランダム（DPRを考慮）
        this.speed = (0.1 + Math.random() * 0.5) * DPR(); // 0.1px/フレームから0.9px/フレームくらい
        // 薄いはちみつ色なので透明度もランダムに
        this.opacity = 0.2 + Math.random() * 0.3; // 0.2から0.5の透明度
        // 雲の色をランダムに選ぶ
        const honeyColors = ["#f6d27a", "#ffcf67", "#ffd98f"];
        this.color = honeyColors[Math.floor(Math.random() * honeyColors.length)];
      }

      update(deltaTime) {
        this.x -= this.speed * (deltaTime / 16); // 16msを基準に速度調整
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.scaleX, this.scaleY);

        ctx.beginPath();
        cloudShapes[this.shapeIndex](ctx);

        // 雲の境界線を強くぼかす
        ctx.filter = `blur(10px)`;

        // 16進数カラーコードをRGBに変換し、透明度を適用
        const r = parseInt(this.color.slice(1,3), 16);
        const g = parseInt(this.color.slice(3,5), 16);
        const b = parseInt(this.color.slice(5,7), 16);
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.opacity})`;
        ctx.fill();

        ctx.restore(); // save()した状態に戻すことでfilterもリセットされる
      }
    }

    // 流れ星オブジェクトのクラスを定義
    class ShootingStar {
      constructor(canvasWidth, canvasHeight) {
        this.reset(canvasWidth, canvasHeight);
      }

      reset(canvasWidth, canvasHeight) {
        this.x = canvasWidth * Math.random() * 1.5; // 画面の少し左から中央右にかけて出現
        this.y = -Math.random() * canvasHeight * 0.2; // 画面の上端より少し上から出現
        this.length = 30 + Math.random() * 50; // 尾の長さ
        this.speed = (5 + Math.random() * 10) * DPR(); // 落下速度
        this.angle = Math.PI / 4 + (Math.random() * Math.PI / 8 - Math.PI / 16); // 落下角度（斜め下）
        this.color = "rgba(255, 240, 200, 1)"; // 明るい黄白色
        this.maxOpacity = 0.8;
        this.opacity = this.maxOpacity;
        this.decayRate = 0.02 + Math.random() * 0.03; // 減衰速度
      }

      update(deltaTime) {
        const dt = deltaTime / 16; // 16msを基準に速度調整
        this.x += Math.cos(this.angle) * this.speed * dt;
        this.y += Math.sin(this.angle) * this.speed * dt;
        this.opacity -= this.decayRate * dt;
        if (this.opacity < 0) this.opacity = 0;
      }

      draw(ctx) {
        if (this.opacity <= 0) return; // 透明度が0になったら描画しない

        ctx.save();
        ctx.globalAlpha = this.opacity; // 全体の透明度を設定

        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        // 尾の終点
        const trailX = this.x - Math.cos(this.angle) * this.length;
        const trailY = this.y - Math.sin(this.angle) * this.length;
        ctx.lineTo(trailX, trailY);

        ctx.strokeStyle = this.color; // 線の色
        ctx.lineWidth = 2; // 線の太さ
        ctx.lineCap = "round"; // 線端を丸くする
        ctx.shadowColor = "rgba(255, 240, 200, 0.8)"; // 影の色
        ctx.shadowBlur = 15; // 影のぼかし
        ctx.stroke();

        ctx.restore();
      }

      isOffScreen(canvasWidth, canvasHeight) {
        // 完全に画面外に出たか、完全に消滅したか
        const trailX = this.x - Math.cos(this.angle) * this.length;
        const trailY = this.y - Math.sin(this.angle) * this.length;
        return (
          (this.x < 0 && trailX < 0) ||
          (this.y > canvasHeight && trailY > canvasHeight) ||
          (this.x > canvasWidth && trailX > canvasWidth) ||
          (this.opacity <= 0)
        );
      }
    }

    // 雲の管理配列と最大雲数
    let clouds = [];
    const MAX_CLOUDS = 8; // 同時に表示する雲の最大数

    // 流れ星の管理配列と出現確率
    let shootingStars = [];
    const SHOOTING_STAR_CHANCE = 0.001; // 1フレームあたりの流れ星が出現する確率

    // 雲の初期化
    function initClouds(canvasWidth, canvasHeight) {
      clouds = [];
      for (let i = 0; i < MAX_CLOUDS; i++) {
        const cloud = new Cloud(canvasWidth, canvasHeight);
        // 画面の右端からさらに右外へ初期配置を分散させる
        cloud.x = canvasWidth + (i / MAX_CLOUDS) * canvasWidth * 2 + Math.random() * canvasWidth * 0.5; // 初期位置を広く分散
        clouds.push(cloud);
      }
    }

    let lastTime = 0; // ループ開始時刻を記録するための変数

    function drawSky(time){
      const ctx = sky.ctx;
      // ctxがnullの場合は描画しない（キャンバスが初期化されていない場合があるため）
      if (!ctx) return;
      ctx.clearRect(0,0,sky.w,sky.h);

      // 前回のループからの経過時間を計算
      const deltaTime = time - lastTime;
      lastTime = time;

      // ほんのり霞
      ctx.globalCompositeOperation = "source-over";
      const haze = ctx.createRadialGradient(sky.w*0.5, sky.h*0.55, 0, sky.w*0.5, sky.h*0.55, Math.max(sky.w, sky.h)*0.75);
      haze.addColorStop(0, "rgba(255,210,120,0.07)");
      haze.addColorStop(0.5, "rgba(255,170,90,0.03)");
      haze.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = haze;
      ctx.fillRect(0,0,sky.w,sky.h);

      // 雲の更新と描画
      for (let i = clouds.length - 1; i >= 0; i--) {
        const cloud = clouds[i];
        cloud.update(deltaTime);
        cloud.draw(ctx);

        // 画面の左外に出たら再生成
        if (cloud.x + cloud.width < -cloud.width * 0.5) { // 雲の半分が画面外に出たら
          cloud.reset(sky.w, sky.h); // 画面の右外に新しい雲を生成
        }
      }

      // 流れ星の生成、更新、描画
      if (Math.random() < SHOOTING_STAR_CHANCE) {
        shootingStars.push(new ShootingStar(sky.w, sky.h));
      }

      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const star = shootingStars[i];
        star.update(deltaTime);
        star.draw(ctx);

        if (star.isOffScreen(sky.w, sky.h)) {
          shootingStars.splice(i, 1); // 画面外に出たか、完全に消滅した流れ星を削除
        }
      }
   }

    // -------------- 海：穏やかな波の揺れ --------------
    const seaCanvas = document.getElementById("seaFX");
    let sea = {ctx:null,w:0,h:0};

    function drawSea(time){
      const ctx = sea.ctx;
      // ctxがnullの場合は描画しない（キャンバスが初期化されていない場合があるため）
      if (!ctx) return;
      ctx.clearRect(0,0,sea.w,sea.h);

      const t = time * 0.001;

      // 前回のループからの経過時間を計算（skyと共通化するためここでも取得）
      const deltaTime = time - lastTime; // lastTimeはdrawSkyで更新されている

      // 水面のうねり（水平線に近いところを強め、下は穏やか）
      const bands = 14;
      for(let i=0;i<bands;i++){
        const y = (i/(bands-1)) * sea.h;
        const p = 1 - (y/sea.h); // 上ほど大きい
        const amp = 6 * p + 1.4;
        const freq = 0.010 + i*0.0009;

        ctx.beginPath();
        for(let x=0;x<=sea.w;x+=8){
          const phase = t*1.0 + i*0.042; /* パラメータを調整して、より自然なうねりに */
          const wave =
            Math.sin(x*freq + phase) * amp +
            Math.sin(x*(freq*0.6) - phase*0.8) * (amp*0.45);
          const yy = y + wave;
          if(x===0) ctx.moveTo(x, yy);
          else ctx.lineTo(x, yy);
        }

        // 線は「泡」っぽく薄く
        const a = 0.05 + p*0.09;
        ctx.strokeStyle = `rgba(210, 255, 245, ${a})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // 反射のほのかな光（灯台光の余韻）
      const glowX = sea.w*0.5;
      const glow = ctx.createRadialGradient(glowX, sea.h*0.05, 0, glowX, sea.h*0.08, sea.w*0.55);
      glow.addColorStop(0, "rgba(255,215,140,0.08)");
      glow.addColorStop(0.35, "rgba(160,255,235,0.05)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0,0,sea.w,sea.h);
    }

    // -------------- ループ & リサイズ --------------
    function resize(){
      sky = fitCanvas(skyCanvas);
      sea = fitCanvas(seaCanvas);
      initClouds(sky.w, sky.h); // 雲の初期化を呼び出す
      // 画面サイズ変更時、既存の流れ星は削除して新しく生成されるようにする
      shootingStars = [];
    }

    let rafId = null;
    function loop(time){
      drawSky(time);
      drawSea(time);
      rafId = requestAnimationFrame(loop);
    }

    window.addEventListener("resize", () => {
      resize();
    }, {passive:true});

    // 初期化
    resize();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
