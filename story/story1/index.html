
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灯台さんと琥珀の空</title>
  <style>
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #fcfcfc;
      color: #333;
    }

    .storybook-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      background-color: #fff;
    }

    .storybook-section {
      padding: 40px 20px;
      margin-bottom: 30px;
      text-align: center;
    }

    .storybook-section:last-child {
      border-bottom: none;
    }

    .text-content {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .text-content p {
      margin-bottom: 1em;
    }

    .image-content img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .video-content video {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>
  <div class="storybook-container">
    <!-- 絵本のタイトルページまたは導入部分 -->
    <div class="storybook-section">
      <div class="text-content">
        <h1>灯台さんと琥珀の空</h1>
        <p>琥珀色の空が広がる海辺の岬で「灯台さん」は暮らしていました。</p>
        <p>灯台さんは昼間は近くの村の子ども達と遊び</p>
        <p>夜は大きな灯台として、漁に出ていた大人達の船が戻れるように灯りを灯していました。</p>
      </div>
      <div class="image-content">
        <img src="https://www.toudaisan.com/story/story1/story1image1.gif" alt="こどもたちとあそぶ灯台さん">
      </div>
    </div>

    <div class="storybook-section">
      <div class="text-content">
        <p>灯台さんはこの琥珀色の空を眺めるのが大好きでした。</p>
        <p>空と海はどこまでも続いて、でも混じり合うことなく、くっきりと分かれていて…</p>
        <p>その様子をいつまでも眺めることができました。</p>
      </div>
    </div>
    
    <div class="storybook-section">
      <div class="text-content">
        <p>ある日、灯台さんが1人岬で釣りをしていると、空に大きな顔が浮かんで</p>
      </div>
      <div class="image-content">
        <img src="https://www.toudaisan.com/story/story1/story1image2.gif" alt="ああなんてことだ">
      </div>
      <div class="text-content">
        <p>となげきました。</p>
      </div>
    </div>
    
    
    <div class="storybook-section">
      <div class="image-content">
        <img src="https://www.toudaisan.com/story/story1/story1image3.gif" alt="空に現れた顔">
      </div>
    </div>
    
    <!-- 必要に応じて、さらにセクションを追加できます -->
    <div class="storybook-section">
      <div class="text-content">
        <p>物語は続く...</p>
      </div>
    </div>
  </div>
</body>
</html>
