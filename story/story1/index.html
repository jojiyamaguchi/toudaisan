
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灯台さんと琥珀の空</title>
  <style>
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #fcfcfc;
      color: #333;
    }

    .storybook-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      background-color: #fff;
    }

    .storybook-section {
      padding: 40px 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    .storybook-section:last-child {
      border-bottom: none;
    }

    .text-content {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .text-content p {
      margin-bottom: 1em;
    }

    .image-content img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .video-content video {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>
  <div class="storybook-container">
    <!-- 絵本のタイトルページまたは導入部分 -->
    <div class="storybook-section">
      <div class="text-content">
        <h1>灯台さんと琥珀の空</h1>
        <p>琥珀色の空が広がる海辺の岬で</p>
        <p>「灯台さん」は暮らしていました。</p>
        <p>灯台さんは昼間は近くの</p>
        <p>村の子ども達と遊び</p>
      </div>
      <div class="image-content">
        <img src="https://toudaisan.com/story/story1/IMG_4031.jpeg" alt="こどもたちとあそぶ灯台さん">
      </div>
    </div>

    <!-- 各ページ（セクション）をここに追加します -->
    <div class="storybook-section">
      <div class="text-content">
        <p>主人公のリリーは、毎日森の入り口で遊ぶのが大好きでした。</p>
        <p>ある日、いつものようにお気に入りの場所へ行くと、キラキラと光るものが目に入りました。</p>
      </div>
      <div class="image-content">
        <img src="https://via.placeholder.com/600x400/FFDDC1/333333?text=美しい森の風景" alt="美しい森の風景">
      </div>
    </div>

    <div class="storybook-section">
      <div class="text-content">
        <p>それは、見たことのないほど美しい蝶々でした。</p>
        <p>蝶々はリリーを誘うように、ひらひらと奥へと飛んでいきます。</p>
      </div>
      <div class="video-content">
        <video src="https://www.w3schools.com/html/mov_bbb.mp4" loop autoplay muted playsinline controls="false"></video>
      </div>
    </div>

    <div class="storybook-section">
      <div class="text-content">
        <p>リリーは、蝶々を追いかけて、森の奥深くへと進んでいきました。</p>
        <p>そこには、まるで夢のような世界が広がっていたのです。</p>
      </div>
      <div class="image-content">
        <img src="https://via.placeholder.com/600x400/A2D2FF/333333?text=夢のような世界" alt="夢のような世界">
      </div>
    </div>

    <!-- 必要に応じて、さらにセクションを追加できます -->
    <div class="storybook-section">
      <div class="text-content">
        <p>物語は続く...</p>
      </div>
    </div>
  </div>
</body>
</html>
